<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dopa-Do チャージ抽選機 完成版</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Anton&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0a0a0f;
    --panel-bg: #12121a;
    --mint: #00E5BC;
    --mint-dark: #00C8A5;
    --meter-empty: rgba(0,229,188,0.12);
    --meter-full-empty: rgba(0,229,188,0.16);
    --bonus-red: #ff073a;
    --bonus-red-dark: #7a0018;
    --copper-main: #b8793a;
    --meter-size: 242px;
    --monitor-size: 176px;
    --symbol-size: 176px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 260px;
    height: 260px;
    min-height: 0;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    user-select: none;
    overflow:hidden;
}
html{width:260px;height:260px;overflow:hidden;background:transparent;}

.pachinko-panel {
    background: transparent;
    padding: 0;
    border-radius: 0;
    border: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 260px;
    height: 260px;
    overflow: hidden;
}

.gimmick-container {
    position: relative;
    width: 260px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* ===== インジケーター ===== */
#meter {
    position: absolute;
    width: var(--meter-size);
    height: var(--meter-size);
    left: 9px;
    top: 9px;
    border-radius: 50%;
    z-index: 1;
    background: conic-gradient(var(--mint) 0% 0%, var(--meter-empty) 0% 100%);
    border: 2px solid rgba(0, 229, 188, 0.88);
    box-shadow:
        0 0 0 1px rgba(0, 229, 188, 0.42),
        0 0 10px rgba(0, 229, 188, 0.36),
        0 0 22px rgba(0, 200, 165, 0.18);
    overflow: hidden;
}

#meter::before {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: var(--bg);
    box-shadow:
        inset 0 0 0 1px rgba(0, 229, 188, 0.22);
}

#meter.max-hold {
    border-color: rgba(0, 229, 188, 1);
    box-shadow:
        0 0 0 1px rgba(0, 229, 188, 0.58),
        0 0 12px rgba(0, 229, 188, 0.48),
        0 0 24px rgba(0, 200, 165, 0.24);
}

#meter.full {
    background: conic-gradient(var(--mint) 0% 100%, var(--meter-full-empty) 100% 100%);
    border-color: rgba(0, 229, 188, 1);
    box-shadow:
        0 0 0 1px rgba(0, 229, 188, 0.95),
        0 0 16px rgba(0, 229, 188, 0.92),
        0 0 34px rgba(0, 229, 188, 0.62),
        0 0 58px rgba(0, 200, 165, 0.38);
}

#meter.full::before {
    box-shadow:
        inset 0 0 0 1px rgba(0, 229, 188, 0.45),
        0 0 18px rgba(0, 229, 188, 0.20);
}

#meter.bonus-flash {
    animation: bonusRedFlash 0.18s linear infinite;
}

#meter.peka-slow {
    animation: pekaSlowFlash 2.05s cubic-bezier(.2,.0,.22,1) infinite;
}

@keyframes pekaSlowFlash {
    0%, 14% {
        filter: brightness(0.42) saturate(0.72);
        border-color: rgba(0, 229, 188, 0.28);
        box-shadow:
            0 0 0 1px rgba(0, 229, 188, 0.10),
            0 0 3px rgba(0, 229, 188, 0.08);
    }
    34%, 58% {
        filter: brightness(1.02) saturate(1.05);
        border-color: rgba(0, 229, 188, 0.86);
        box-shadow:
            0 0 0 1px rgba(0, 229, 188, 0.55),
            0 0 13px rgba(0, 229, 188, 0.42),
            0 0 28px rgba(0, 200, 165, 0.22);
    }
    72%, 86% {
        filter: brightness(1.32) saturate(1.24);
        border-color: rgba(0, 229, 188, 1);
        box-shadow:
            0 0 0 1px rgba(0, 229, 188, 1),
            0 0 24px rgba(0, 229, 188, 0.95),
            0 0 54px rgba(0, 229, 188, 0.66),
            0 0 88px rgba(0, 200, 165, 0.36);
    }
    100% {
        filter: brightness(0.42) saturate(0.72);
        border-color: rgba(0, 229, 188, 0.28);
        box-shadow:
            0 0 0 1px rgba(0, 229, 188, 0.10),
            0 0 3px rgba(0, 229, 188, 0.08);
    }
}

@keyframes bonusRedFlash {
    0%, 100% {
        background: conic-gradient(var(--bonus-red) 0% 100%, rgba(255,7,58,0.15) 100% 100%);
        border-color: rgba(255, 7, 58, 1);
        box-shadow:
            0 0 0 1px rgba(255, 7, 58, 0.95),
            0 0 16px rgba(255, 7, 58, 0.88),
            0 0 34px rgba(255, 7, 58, 0.58);
    }

    50% {
        background: conic-gradient(var(--bonus-red-dark) 0% 100%, rgba(255,7,58,0.08) 100% 100%);
        border-color: rgba(255, 7, 58, 0.36);
        box-shadow:
            0 0 0 1px rgba(255, 7, 58, 0.22),
            0 0 8px rgba(255, 7, 58, 0.22);
    }
}

/* ===== 金属ベゼル ===== */
.metal-bezel {
    position: absolute;
    width: 210px;
    height: 210px;
    border-radius: 50%;
    background: linear-gradient(135deg, #888, #333);
    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.3),
        0 6px 16px rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
}

.metal-inner {
    width: 188px;
    height: 188px;
    border-radius: 50%;
    background: #000;
    box-shadow: inset 0 6px 14px rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
}

#monitor {
    width: var(--monitor-size);
    height: var(--monitor-size);
    border-radius: 50%;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== LOGO ===== */
#logo {
    --frame-w: 132px;
    --frame-h: 92px;
    --frame-border: 3px;
    --inner-scale: 0.80;

    position: absolute;
    inset: 0;
    z-index: 5;
}

.bracket-frame {
    position: absolute;
    width: var(--frame-w);
    height: var(--frame-h);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    box-sizing: border-box;
    display: block;
    background: transparent;
}

.corner {
    position: absolute;
    width: 17px;
    height: 21px;
    border-color: var(--mint);
    border-style: solid;
    opacity: 0.96;
    box-sizing: border-box;
    filter:
        drop-shadow(0 0 2px rgba(0,229,188,0.98))
        drop-shadow(0 0 6px rgba(0,229,188,0.78))
        drop-shadow(0 0 14px rgba(0,200,165,0.36));
    transition: none;
}

.corner.tl {
    top: 0;
    left: 0;
    border-width: var(--frame-border) 0 0 var(--frame-border);
}

.corner.tr {
    top: 0;
    right: 0;
    border-width: var(--frame-border) var(--frame-border) 0 0;
}

.corner.bl {
    bottom: 0;
    left: 0;
    border-width: 0 0 var(--frame-border) var(--frame-border);
}

.corner.br {
    bottom: 0;
    right: 0;
    border-width: 0 var(--frame-border) var(--frame-border) 0;
}

.dodo-text {
    position: absolute;
    width: calc(var(--frame-w) * var(--inner-scale));
    height: calc(var(--frame-h) * var(--inner-scale));
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 0;
    background: transparent;
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    box-shadow: none;
    overflow: hidden;
    white-space: nowrap;
    transition: none;
}

.dodo-label {
    font-family: 'Anton', 'Arial Black', 'Impact', sans-serif;
    font-weight: 900;
    font-size: 33px;
    line-height: 1;
    letter-spacing: 1.05px;
    color: transparent;
    position: relative;
    top: 3px;
    transform: scaleX(0.82) scaleY(1.06);
    transform-origin: center center;
    text-shadow: none;
    white-space: nowrap;
}

.sub-text {
    position: absolute;
    left: 50%;
    top: 142px;
    transform: translateX(-50%);
    font-family:
        'Bank Gothic',
        'BankGothic Md BT',
        'Bank Gothic Medium',
        'BankGothic',
        'Orbitron',
        sans-serif;
    font-weight: 700;
    font-size: 9.8px;
    letter-spacing: 0.55px;
    color: var(--mint);
    text-transform: none;
    white-space: nowrap;
    text-shadow:
        0 0 4px rgba(0,229,188,1),
        0 0 12px rgba(0,229,188,0.74),
        0 0 26px rgba(0,200,165,0.38);
    filter: none;
}

/* ペカ時 */
#logo.peka .corner {
    opacity: 1;
    border-color: var(--mint);
    filter:
        drop-shadow(0 0 2px rgba(0,229,188,1))
        drop-shadow(0 0 8px rgba(0,229,188,0.98))
        drop-shadow(0 0 18px rgba(0,229,188,0.68))
        drop-shadow(0 0 34px rgba(0,200,165,0.42));
}

#logo.peka .dodo-text {
    opacity: 1;
    background: var(--mint-dark);
    box-shadow:
        inset 0 0 0 1px rgba(0,229,188,0.82),
        0 0 10px rgba(0,229,188,0.62),
        0 0 22px rgba(0,229,188,0.48),
        0 0 40px rgba(0,200,165,0.28);
}

#logo.peka .dodo-label {
    color: #fff;
    text-shadow:
        2px 2px 0 rgba(0,0,0,0.88),
        3px 3px 0 rgba(0,0,0,0.55);
}

#logo.peka .sub-text {
    color: var(--mint);
    text-shadow:
        0 0 4px rgba(0,229,188,1),
        0 0 13px rgba(0,229,188,0.78),
        0 0 28px rgba(0,200,165,0.42);
}

/* ===== リール ===== */
#reel-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: none;
    z-index: 6;
    background: #000;
}

#reel-strip {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
}

.symbol {
    width: var(--symbol-size);
    height: var(--symbol-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
}

/* Tia白：銅色六角パネル */
.tia-panel {
    width: 122px;
    height: 108px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background: linear-gradient(145deg, #d68a45 0%, #8f4a22 45%, #5d2b14 100%);
    border: none;
    box-shadow:
        inset 0 3px 0 rgba(255, 221, 170, 0.45),
        inset 0 -5px 0 rgba(50, 18, 4, 0.55),
        inset 5px 0 0 rgba(255, 186, 105, 0.18),
        inset -5px 0 0 rgba(32, 12, 4, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
}

.tia-panel span {
    color: #fff4df;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 1px;
    text-shadow:
        1px 1px 0 rgba(0,0,0,0.85),
        2px 2px 0 rgba(0,0,0,0.55);
}

/* BONUS：金プレート */
.bonus-plate {
    width: 128px;
    height: 82px;
    background: linear-gradient(145deg, #fff2a6 0%, #f2c230 35%, #a86b00 100%);
    border: 4px solid #6b3f00;
    box-shadow:
        inset 0 3px 0 rgba(255,255,220,0.62),
        inset 0 -6px 0 rgba(91,50,0,0.52),
        0 5px 0 rgba(0,0,0,0.78),
        0 10px 18px rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
}

.bonus-plate span {
    color: #d40018;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
    white-space: nowrap;
    text-shadow:
        -1px -1px 0 #fff2b8,
        1px -1px 0 #fff2b8,
        -1px 1px 0 #fff2b8,
        1px 1px 0 #fff2b8,
        2px 3px 0 rgba(0,0,0,0.42),
        0 5px 8px rgba(0,0,0,0.30);
    transform: translateY(-2px);
}

.spinning {
    animation: spinLoop 0.14s linear infinite;
}

@keyframes spinLoop {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-704px); }
}

/* ===== INFO ===== */
.info-panel { display:none !important; }

#status {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #555;
    margin-bottom: 8px;
    min-height: 16px;
}

.counter-row {
    font-size: 10px;
    color: #666;
    margin: 3px 0;
    letter-spacing: 1px;
}

.counter-row span {
    font-size: 14px;
    font-weight: 900;
    color: var(--mint);
}

.debug-row { display:none !important; }

.debug-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 8px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.15s;
}

.debug-btn:active {
    opacity: 0.6;
}

.btn-miss {
    background: #1e1e1e;
    color: #888;
    border: 1px solid #444;
}

.btn-white {
    background: #0e0e22;
    color: #aaaaff;
    border: 1px solid #3333aa;
}

.btn-bonus {
    background: #1a1000;
    color: #ffd700;
    border: 1px solid #996600;
}

#meter.idle-pulse{animation:meterIdlePulse 1.55s ease-in-out infinite}
@keyframes meterIdlePulse{0%,100%{box-shadow:0 0 0 1px rgba(0,229,188,0.42),0 0 10px rgba(0,229,188,0.30),0 0 22px rgba(0,200,165,0.14)}50%{box-shadow:0 0 0 1px rgba(0,229,188,0.70),0 0 18px rgba(0,229,188,0.56),0 0 38px rgba(0,200,165,0.26)}}
#meter.charge-focus{animation:meterChargeFocus .46s linear infinite}
@keyframes meterChargeFocus{0%,100%{filter:brightness(1)}50%{filter:brightness(1.20)}}

</style>
</head>

<body>
<div class="pachinko-panel">
    <div class="gimmick-container" onclick="handleGimmickClick()">
        <div id="meter"></div>

        <div class="metal-bezel">
            <div class="metal-inner">
                <div id="monitor">
                    <div id="logo">
                        <div class="bracket-frame">
                            <div class="corner tl"></div>
                            <div class="corner tr"></div>
                            <div class="corner bl"></div>
                            <div class="corner br"></div>
                            <span class="dodo-text">
                                <span class="dodo-label">DODO!!</span>
                            </span>
                        </div>
                        <span class="sub-text">Dopa-Do System</span>
                    </div>

                    <div id="reel-container">
                        <div id="reel-strip">
                            <div class="symbol"><div class="bonus-plate"><span>BONUS確定</span></div></div>
                            <div class="symbol"><div class="tia-panel"><span>Tia白</span></div></div>
                            <div class="symbol"><div class="tia-panel"><span>Tia白</span></div></div>
                            <div class="symbol"><div class="tia-panel"><span>Tia白</span></div></div>
                            <div class="symbol"><div class="bonus-plate"><span>BONUS確定</span></div></div>
                            <div class="symbol"><div class="tia-panel"><span>Tia白</span></div></div>
                            <div class="symbol"><div class="tia-panel"><span>Tia白</span></div></div>
                            <div class="symbol"><div class="tia-panel"><span>Tia白</span></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panel">
        <div id="status">TAP TO START</div>
        <div class="counter-row">完了タスク: <span id="count">0</span></div>
        <div class="counter-row">無料期間: <span id="days">0</span>日</div>
    </div>

    <div class="debug-row">
        <button class="debug-btn btn-miss" onclick="event.stopPropagation(); forceResult('miss')">MISS</button>
        <button class="debug-btn btn-white" onclick="event.stopPropagation(); forceResult('white')">WHITE</button>
        <button class="debug-btn btn-bonus" onclick="event.stopPropagation(); forceResult('bonus')">BONUS</button>
    </div>
</div>

<script>
const els = {
    meter: document.getElementById('meter'),
    logo: document.getElementById('logo'),
    reelContainer: document.getElementById('reel-container'),
    reelStrip: document.getElementById('reel-strip'),
    status: document.getElementById('status'),
    count: document.getElementById('count'),
    days: document.getElementById('days')
};

const SYMBOL_HEIGHT = 176;
const RESULT_LIGHT_DELAY = 450;
const PARENT_CONTROLLED = window.parent && window.parent !== window;

let count = 0;
let state = 'OFF';
let rafId = null;
let pendingOutcome = null;
let resultLightTimer = null;
let resultEmitTimer = null;
let forcedBonusMode = false;
let resultSent = false;
let inputGuardUntil = 0;
let spinCanStopAt = 0;
function setReadySignal(on){els.meter.classList.toggle('idle-pulse',!!on)}
function setChargePulse(on){els.meter.classList.toggle('charge-focus',!!on)}

updateDisplay();
setMeter(0);
setReadySignal(true);
if (PARENT_CONTROLLED) setStatus('STANDBY');

function emitChargeResult(kind) {
    if (!PARENT_CONTROLLED || resultSent) return;
    resultSent = true;
    window.parent.postMessage({ type: 'DOPAON_CHARGE_RESULT', kind }, '*');
}
function emitChargeState(phase) {
    if (!PARENT_CONTROLLED) return;
    window.parent.postMessage({ type: 'DOPAON_CHARGE_STATE', phase }, '*');
}

function clearResultEmitTimer() {
    if (resultEmitTimer) clearTimeout(resultEmitTimer);
    resultEmitTimer = null;
}
function scheduleEmit(kind, ms) {
    clearResultEmitTimer();
    resultEmitTimer = setTimeout(() => {
        resultEmitTimer = null;
        emitChargeResult(kind);
    }, ms);
}

function updateDisplay() {
    if (els.count) els.count.innerText = count;
    if (els.days) els.days.innerText = count * 7;
}

function setStatus(text) {
    els.status.innerText = text;
}

function clearTimer(timerId) {
    if (timerId) clearTimeout(timerId);
}

function clearResultLightTimer() {
    clearTimer(resultLightTimer);
    resultLightTimer = null;
}

function stopRaf() {
    if (!rafId) return;
    cancelAnimationFrame(rafId);
    rafId = null;
}

function meterBg(color, pct, empty = 'rgba(0,229,188,0.12)') {
    return `conic-gradient(${color} 0% ${pct}%, ${empty} ${pct}% 100%)`;
}

function setMeter(pct) {
    const safePct = Math.max(0, Math.min(100, pct));
    const col = forcedBonusMode ? '#ff073a' : '#00E5BC';
    const emp = forcedBonusMode ? 'rgba(255,7,58,0.13)' : 'rgba(0,229,188,0.12)';

    els.meter.classList.remove('full', 'max-hold', 'bonus-flash', 'peka-slow');
    els.meter.style.background = meterBg(col, safePct, emp);
}

function setMeterMaxHold() {
    els.meter.classList.remove('full', 'bonus-flash', 'peka-slow');
    els.meter.classList.add('max-hold');
    els.meter.style.background = meterBg(forcedBonusMode ? '#ff073a' : '#00E5BC', 100, forcedBonusMode ? 'rgba(255,7,58,0.13)' : 'rgba(0,229,188,0.12)');
}

function setMeterFull() {
    els.meter.classList.remove('max-hold', 'bonus-flash', 'peka-slow');
    els.meter.style.background = meterBg(forcedBonusMode ? '#ff073a' : '#00E5BC', 100, forcedBonusMode ? 'rgba(255,7,58,0.13)' : 'rgba(0,229,188,0.16)');
    if(!forcedBonusMode) els.meter.classList.add('full');
    else els.meter.classList.add('max-hold');
}

function setBonusFlash() {
    els.meter.classList.remove('full', 'max-hold', 'peka-slow');
    els.meter.classList.add('bonus-flash');
}

function setWhiteResultMeter() {
    els.meter.classList.remove('bonus-flash', 'full', 'max-hold', 'peka-slow');
    els.meter.style.background = meterBg('#b8793a', 100, 'rgba(184,121,58,0.15)');
}

function setBlueResultMeter() {
    els.meter.classList.remove('bonus-flash', 'full', 'max-hold', 'peka-slow');
    els.meter.style.background = meterBg('#3aa0ff', 100, 'rgba(58,160,255,0.15)');
}

function setTiaLabels(text) {
    document.querySelectorAll('.tia-panel span').forEach(el => { el.textContent = text; });
}

function clearPekaVisuals() {
    clearResultLightTimer();
    if (resultEmitTimer) {
        clearTimeout(resultEmitTimer);
        resultEmitTimer = null;
    }
    els.meter.classList.remove('full', 'max-hold', 'flashing', 'bonus-flash', 'peka-slow');
    els.logo.classList.remove('peka');
}

function resetReel() {
    els.reelContainer.style.display = 'none';
    els.reelStrip.classList.remove('spinning');
    els.reelStrip.style.transform = '';
    setTiaLabels('Tia白');
}

function animateMeterTo(targetPct, duration, onDone) {
    stopRaf();

    let startTime = null;
    const easeOut = t => 1 - Math.pow(1 - t, 3);

    function frame(ts) {
        if (!startTime) startTime = ts;

        const t = Math.min(1, (ts - startTime) / duration);
        setMeter(targetPct * easeOut(t));

        if (t < 1) {
            rafId = requestAnimationFrame(frame);
            return;
        }

        rafId = null;
        onDone();
    }

    rafId = requestAnimationFrame(frame);
}

function animateMeterDown(fromPct, duration, onDone) {
    stopRaf();

    let startTime = null;
    const easeIn = t => Math.pow(t, 2.8);

    function frame(ts) {
        if (!startTime) startTime = ts;

        const t = Math.min(1, (ts - startTime) / duration);
        setMeter(fromPct * (1 - easeIn(t)));

        if (t < 1) {
            rafId = requestAnimationFrame(frame);
            return;
        }

        setMeter(0);
        rafId = null;
        onDone();
    }

    rafId = requestAnimationFrame(frame);
}

function handleGimmickClick() {
    const now = Date.now();
    if (now < inputGuardUntil) return;
    inputGuardUntil = now + 170;

    if (state === 'OFF') {
        if (PARENT_CONTROLLED) return;
        startCharge(null);
        return;
    }

    if (state === 'PEKA') {
        startSpin();
        inputGuardUntil = Date.now() + 520;
        return;
    }

    if (state === 'SPINNING') {
        if (Date.now() < spinCanStopAt) return;
        stopSpinManual();
        inputGuardUntil = Date.now() + 520;
        return;
    }

    // STOPPED / ROLLING / result wait: ignore extra taps until parent resets.
}

function startCharge(forceOutcome) {
    if (state !== 'OFF') return;
    resultSent = false;
    clearResultEmitTimer();
    inputGuardUntil = Date.now() + 240;
    spinCanStopAt = 0;

    clearPekaVisuals();
    setReadySignal(false);
    setChargePulse(true);

    state = 'ROLLING';
    emitChargeState('rolling');
    pendingOutcome = forceOutcome;
    forcedBonusMode = forceOutcome === 'bonus';
    setStatus(forcedBonusMode ? 'BONUS CHARGE' : 'CHARGING...');

    const pattern = decideChargePattern(forceOutcome);

    if (pattern === 'hit') {
        chargeToMaxThenPeka();
        return;
    }

    if (pattern === 'fakeMiss') {
        chargeToMaxThenMiss();
        return;
    }

    chargePartialThenMiss();
}

function decideChargePattern(forceOutcome) {
    if (forceOutcome === 'bonus' || forceOutcome === 'white' || forceOutcome === 'blue') return 'hit';
    if (forceOutcome === 'miss') return Math.random() < 0.10 ? 'fakeMiss' : 'normalMiss';

    // 通常時: 1/3でペカ。ハズレ時のフェイク満タンはハズレ10回に1回くらい。
    const r = Math.random();
    if (r < 1 / 3) return 'hit';
    return Math.random() < 0.10 ? 'fakeMiss' : 'normalMiss';
}

function chargeToMaxThenPeka() {
    animateMeterTo(100, 700, () => {
        setMeterMaxHold();
        setStatus('MAX...');

        setTimeout(() => {
            if (state !== 'ROLLING') return;
            triggerPeka();
        }, 1000);
    });
}

function chargeToMaxThenMiss() {
    animateMeterTo(100, 700, () => {
        setMeterMaxHold();
        setStatus('MAX...');

        setTimeout(() => {
            if (state !== 'ROLLING') return;

            setStatus('DROP...');
            animateMeterDown(100, 650, () => {
                state = 'OFF';
                emitChargeState('miss');
                setChargePulse(false);
                setStatus('MISS');
                setReadySignal(true);
                scheduleEmit('miss', 350);
            });
        }, 1000);
    });
}

function chargePartialThenMiss() {
    const peak = Math.random() * 72 + 8;

    animateMeterTo(peak, 780, () => {
        setStatus('DROP...');

        animateMeterDown(peak, 520, () => {
            state = 'OFF';
            emitChargeState('miss');
            setChargePulse(false);
            setStatus('MISS');
            setReadySignal(true);
            scheduleEmit('miss', 350);
        });
    });
}

function triggerPeka() {
    state = 'PEKA';
    emitChargeState('peka');

    setChargePulse(false);
    setMeterFull();
    els.meter.classList.add('peka-slow');
    els.logo.classList.add('peka');
    setStatus('PUSH TO SPIN');

    if (navigator.vibrate) navigator.vibrate([150]);
}

function startSpin() {
    if (state !== 'PEKA') return;
    state = 'SPINNING';
    spinCanStopAt = Date.now() + 520;
    emitChargeState('spinning');

    clearResultLightTimer();
    els.logo.classList.remove('peka');
    els.meter.classList.remove('peka-slow');
    setReadySignal(false);

    els.reelStrip.style.transform = '';
    els.reelContainer.style.display = 'block';
    els.reelStrip.classList.add('spinning');

    setStatus('TAP TO STOP');

    if (navigator.vibrate) navigator.vibrate([60]);
}

function stopSpinManual() {
    if (state !== 'SPINNING') return;

    state = 'STOPPED';
    emitChargeState('stopped');
    els.reelStrip.classList.remove('spinning');
    clearResultLightTimer();

    const outcome = resolveOutcome();
    pendingOutcome = null;

    if (outcome === 'bonus') {
        stopAsBonus();
    } else if (outcome === 'blue') {
        stopAsBlue();
    } else {
        stopAsWhite();
    }

    updateDisplay();
}

function resolveOutcome() {
    if (pendingOutcome && pendingOutcome !== 'miss') return pendingOutcome;
    // ペカ後: 1/4 BONUS, 2/4 Tia白, 1/4 Tia青
    const r = Math.random();
    if (r < 0.25) return 'bonus';
    if (r < 0.75) return 'white';
    return 'blue';
}

function stopAsBonus() {
    els.reelStrip.style.transform = 'translateY(0px)';
    setStatus('BONUS確定');

    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);

    count += 3;

    resultLightTimer = setTimeout(() => {
        if (state !== 'STOPPED') return;
        setBonusFlash();
    }, RESULT_LIGHT_DELAY);

    scheduleEmit('bonus', 950);
}

function stopAsWhite() {
    const idx = Math.floor(Math.random() * 3) + 1;

    els.reelStrip.style.transform = `translateY(-${idx * SYMBOL_HEIGHT}px)`;
    setStatus('Tia白');

    if (navigator.vibrate) navigator.vibrate([40]);

    count += 1;

    resultLightTimer = setTimeout(() => {
        if (state !== 'STOPPED') return;
        setWhiteResultMeter();
    }, RESULT_LIGHT_DELAY);

    scheduleEmit('white', 900);
}


function stopAsBlue() {
    const idx = Math.floor(Math.random() * 3) + 1;

    setTiaLabels('Tia青');
    els.reelStrip.style.transform = `translateY(-${idx * SYMBOL_HEIGHT}px)`;
    setStatus('Tia青');

    if (navigator.vibrate) navigator.vibrate([40, 30, 80]);

    count += 2;

    resultLightTimer = setTimeout(() => {
        if (state !== 'STOPPED') return;
        setBlueResultMeter();
    }, RESULT_LIGHT_DELAY);

    scheduleEmit('blue', 900);
}

function resetToOff() {
    stopRaf();
    clearResultEmitTimer();
    clearPekaVisuals();
    setChargePulse(false);
    resetReel();

    setMeter(0);
    setStatus('TAP TO START');

    state = 'OFF';
    emitChargeState('off');
    pendingOutcome = null;
    forcedBonusMode = false;
    resultSent = false;
    inputGuardUntil = 0;
    spinCanStopAt = 0;
    setReadySignal(true);
}

function forceResult(type) {
    stopRaf();
    clearResultEmitTimer();
    resultSent = false;
    inputGuardUntil = 0;
    spinCanStopAt = 0;
    clearPekaVisuals();
    setChargePulse(false);
    resetReel();

    setMeter(0);

    state = 'OFF';
    pendingOutcome = type;

    startCharge(type);
}

window.addEventListener('message', event => {
    const d = event.data || {};
    if (d.type === 'DOPAON_CHARGE_START') {
        forceResult(d.force || null);
    }
    if (d.type === 'DOPAON_CHARGE_RESET') {
        resetToOff();
    }
});
</script>
