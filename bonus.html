<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Reggae One',sans-serif;}
#stage{position:fixed;inset:0;}
#bg{position:absolute;inset:0;width:100%;height:100%;}
#content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6vh;padding:0 3vw;}
.ha{animation:hsl 1.4s cubic-bezier(0.12,0.8,0.3,1) forwards;}
.hb{animation:hsl 1.1s cubic-bezier(0.12,0.8,0.3,1) forwards;}
.hj{animation:hslb 2s cubic-bezier(0.1,0.9,0.25,1) forwards;}
@keyframes hsl{0%{transform:scale(5) rotate(-60deg);opacity:0;}35%{opacity:1;}80%{transform:scale(0.97) rotate(3deg);}100%{transform:scale(1) rotate(0);}}
@keyframes hslb{0%{transform:scale(10) rotate(-100deg);opacity:0;}25%{opacity:1;}70%{transform:scale(1.05) rotate(6deg);}85%{transform:scale(0.96) rotate(-3deg);}100%{transform:scale(1) rotate(0);}}
.je{animation:ji 0.5s cubic-bezier(0.15,1.5,0.3,1) forwards;}
@keyframes ji{0%{transform:scale(2.6) translateY(-50px);opacity:0;}60%{transform:scale(0.96) translateY(4px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}
.ose{background:linear-gradient(180deg,#333,#111);color:#fff;border:3px solid #fff;border-radius:14px;padding:4vw 11vw;font-size:6.5vw;font-weight:900;cursor:pointer;letter-spacing:0.05em;font-family:'Reggae One',sans-serif;box-shadow:0 6px 0 #000,0 0 30px rgba(255,255,255,0.6);}
.btn{background:linear-gradient(180deg,#2a2a2a,#0d0d0d);color:#FFD700;border:2px solid #8a6000;border-radius:10px;padding:4vw 9vw;font-size:5vw;font-weight:900;cursor:pointer;letter-spacing:0.05em;font-family:'Reggae One',sans-serif;box-shadow:0 4px 0 #000;}
.rst{background:#111;color:#ddd;border:1px solid #555;border-radius:8px;padding:3vw 7vw;font-size:3.6vw;cursor:pointer;font-family:'Reggae One',sans-serif;position:relative;z-index:999;pointer-events:auto;}
.bonus-result-copy{text-align:center;min-height:16vw;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4vw;text-shadow:2px 2px 0 #000,0 0 18px rgba(255,255,255,.28);}
.bonus-result-kind{font-size:4.2vw;color:#ffd76a;letter-spacing:.08em;}
.bonus-result-text{font-size:7vw;color:#fff;line-height:1.1;max-width:92vw;word-break:keep-all;}
.bonus-result-sub{font-size:3.4vw;color:#aab;letter-spacing:.04em;}
#go{position:fixed;inset:0;z-index:80;display:none;background:rgba(60,60,60,0.75);}
#bo{position:fixed;inset:0;z-index:90;background:#000;opacity:0;pointer-events:none;}
#flash{position:fixed;inset:0;z-index:85;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.08s ease-out;}
@keyframes glowPulse{0%{filter:drop-shadow(0 0 0px transparent);}50%{filter:drop-shadow(0 0 calc(var(--gi)*2px) var(--gc)) drop-shadow(0 0 calc(var(--gi)*8px) var(--gc));}100%{filter:drop-shadow(0 0 calc(var(--gi)*2px) var(--gc)) drop-shadow(0 0 calc(var(--gi)*8px) var(--gc));}}
.glow-anim{animation:glowPulse 1.2s ease-out forwards;}
.shake-light{animation:shL 0.25s ease both;}
@keyframes shL{0%{transform:translate(0,0);}20%{transform:translate(6px,3px);}40%{transform:translate(-5px,-4px);}60%{transform:translate(4px,-2px);}80%{transform:translate(-3px,3px);}100%{transform:translate(0,0);}}
.shake-hard{animation:shH 0.3s ease both;}
@keyframes shH{0%{transform:translate(0,0);}15%{transform:translate(12px,6px);}30%{transform:translate(-10px,-8px);}45%{transform:translate(9px,-5px);}60%{transform:translate(-8px,7px);}75%{transform:translate(6px,-4px);}100%{transform:translate(0,0);}}
.shake-mega{animation:shM 0.4s ease both;}
@keyframes shM{0%{transform:translate(0,0);}10%{transform:translate(18px,10px);}25%{transform:translate(-16px,-12px);}40%{transform:translate(14px,-9px);}55%{transform:translate(-12px,11px);}70%{transform:translate(10px,-8px);}85%{transform:translate(-6px,5px);}100%{transform:translate(0,0);}}
</style>
</head>
<body>
<div id="stage"><canvas id="bg"></canvas><div id="content"></div></div>
<div id="go"></div>
<div id="bo"></div>
<div id="flash"></div>
<script>
var stage=document.getElementById('stage');
var cv=document.getElementById('bg');
var bx=cv.getContext('2d');
var ct=document.getElementById('content');

function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);

function flash(intensity){
  var el=document.getElementById('flash');
  el.style.opacity=intensity||0.85;
  setTimeout(function(){el.style.opacity='0';},80);
}
function shake(level){
  var cls=level===3?'shake-mega':level===2?'shake-hard':'shake-light';
  stage.classList.remove('shake-light','shake-hard','shake-mega');
  void stage.offsetWidth;
  stage.classList.add(cls);
  setTimeout(function(){stage.classList.remove(cls);},400);
}
var _shakeRAF=null;
function startStepShake(durationMs,boost){
  stopStepShake();
  var start=performance.now();
  function frame(now){
    var elapsed=now-start;
    if(elapsed>=durationMs){stage.style.transform='';_shakeRAF=null;return;}
    var prog=elapsed/durationMs;
    var amp,skip=false;
    if(prog<0.10){ amp=30*(1-(prog/0.10)); }
    else if(prog<0.30){ amp=0; }
    else {
      var p2=(prog-0.30)/0.70;
      var skipRate=Math.round((1-p2)*10);
      if(skipRate>0 && Math.floor(elapsed/16)%skipRate!==0) skip=true;
      amp=(boost&&elapsed>durationMs-300)?15:4;
    }
    if(skip||amp<0.5){ stage.style.transform=''; }
    else {
      var dx=(Math.random()*2-1)*amp;
      var dy=(Math.random()*2-1)*amp;
      stage.style.transform='translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px)';
    }
    _shakeRAF=requestAnimationFrame(frame);
  }
  _shakeRAF=requestAnimationFrame(frame);
}
function stopStepShake(){ if(_shakeRAF){cancelAnimationFrame(_shakeRAF);_shakeRAF=null;} stage.style.transform=''; }

var C={
  white: {fill:'#000000', grad:'linear-gradient(180deg,#fff,#e8e8e8)',         glow:false, flame:['#000000','#222222','#555555','#aaaaaa'], fi:0.18, shoji:'#b0b0b0'},
  blue:  {fill:'#000000', grad:'linear-gradient(180deg,#b0e8ff,#fff,#40a8ff)', glow:false, flame:['#000033','#0033aa','#0066ff','#88ccff'], fi:0.34, shoji:'#1050c0'},
  green: {fill:'#000000', grad:'linear-gradient(180deg,#a0ff90,#fff,#30cc30)', glow:false, flame:['#001100','#005500','#00cc00','#aaffaa'], fi:0.50, shoji:'#18901a'},
  purple:{fill:'#000000', grad:'linear-gradient(180deg,#e8a0ff,#fff,#b030ff)', glow:true,  flame:['#110022','#550099','#cc00ff','#ff88ff'], fi:0.68, shoji:'#8020cc'},
  red:   {fill:'#ff2200', grad:'linear-gradient(180deg,#ff3300,#ff9900,#ffee00,#ff5500)', glow:true, flame:['#220000','#880000','#ff4400','#ffcc00'], fi:0.84, shoji:'#cc1800'},
  gold:  {fill:'#000000', grad:'linear-gradient(180deg,#ff8800,#FFD700,#fffaa0,#FFD700,#ff7700)', glow:true, flame:['#221100','#884400','#FFD700','#ffffff'], fi:1.00, shoji:'#cc9900', gc:'rgba(255,215,0,0.9)'},
};
var BGCOL={white:'#1a1a1a',blue:'#0a0f1f',green:'#061206',purple:'#0e0018',red:'#120000',gold:'#0f0800',dark:'#0a0a0a'};
var RAINBOW_FLAME=['#ff0000','#ff6600','#ffdd00','#00cc00'];

function makeSvgText(text,colorKey,rotateDeg){
  var col=C[colorKey];
  var W=window.innerWidth;
  var n=text.length;
  var vw=colorKey==='gold'?Math.min(78/Math.max(n,1)*1.35,24):Math.min(78/Math.max(n,1),17);
  var fs=W*vw/100;
  var swW=Math.max(7,Math.round(fs*0.26));
  var swB=Math.max(4,Math.round(fs*0.15));
  var vbH=Math.round(fs*1.4+(swW+4)*2);
  var cy=Math.round(vbH*0.72);
  var gid='g'+Math.random().toString(36).slice(2,8);
  var gcols=col.grad.match(/#[0-9a-fA-F]+/g);
  var glowF=col.glow?'<filter id="'+gid+'f" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="'+Math.round(fs*0.04)+'" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>':'';
  var glowA=col.glow?'filter="url(#'+gid+'f)"':'';
  var fa='font-family="Reggae One,sans-serif" font-size="'+fs+'" text-anchor="middle"';
  var svg='<svg viewBox="0 0 '+W+' '+vbH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;overflow:visible;">'
    +'<defs><linearGradient id="'+gid+'" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="'+gcols[0]+'"/><stop offset="100%" stop-color="'+gcols[gcols.length-1]+'"/></linearGradient>'+glowF+'</defs>'
    +'<text x="50%" y="'+cy+'" '+fa+' fill="none" stroke="#000" stroke-width="'+swW+'" stroke-linejoin="round" paint-order="stroke">'+text+'</text>'
    +'<text x="50%" y="'+cy+'" '+fa+' fill="none" stroke="#fff" stroke-width="'+swB+'" stroke-linejoin="round" paint-order="stroke">'+text+'</text>'
    +'<text x="50%" y="'+cy+'" '+fa+' fill="url(#'+gid+')" '+glowA+'>'+text+'</text>'
    +'</svg>';
  return rotateDeg?'<div style="transform:rotate('+rotateDeg+'deg);width:100%;">'+svg+'</div>':svg;
}

function makeHex(label,size,tier){
  var r=size/2,cx=r,cy=r,pts='';
  for(var i=0;i<6;i++){var a=Math.PI/180*(60*i-30);pts+=(cx+r*0.88*Math.cos(a))+','+(cy+r*0.88*Math.sin(a))+' ';}
  var D={4:{fill:'#1a0040',stroke:'#9040ff',text:'#e0a0ff',hi:'#c060ff'},6:{fill:'#301200',stroke:'#FFD700',text:'#FFE680',hi:'#fff8a0'},0:{fill:'#1a1a1a',stroke:'#ccc',text:'#ffffff',hi:'#ffffff'}};
  var c=D[tier]||D[6],fs=size*0.18;
  var hid='hx'+Math.random().toString(36).slice(2,6);
  var panelSvg='<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg" style="max-width:88vw;display:block;" id="'+hid+'">'
    +'<defs><radialGradient id="hg'+hid+'" cx="38%" cy="32%" r="65%"><stop offset="0%" stop-color="'+c.hi+'" stop-opacity="0.35"/><stop offset="100%" stop-color="'+c.fill+'"/></radialGradient>'
    +'<filter id="hf'+hid+'"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'
    +'<g class="hexPoly"><polygon points="'+pts+'" fill="#050505" stroke="'+c.stroke+'" stroke-width="'+size*0.04+'"/><polygon points="'+pts+'" fill="url(#hg'+hid+')"/></g></svg>';
  var labelDiv='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">'
    +'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg" style="max-width:88vw;position:absolute;">'
    +'<defs><filter id="hf2'+hid+'"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>'
    +'<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" font-family="Reggae One,sans-serif" font-size="'+fs+'" fill="none" stroke="#000" stroke-width="'+fs*0.13+'" stroke-linejoin="round" paint-order="stroke">'+label+'</text>'
    +'<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" font-family="Reggae One,sans-serif" font-size="'+fs+'" fill="'+c.text+'" filter="url(#hf2'+hid+')">'+label+'</text>'
    +'</svg></div>';
  return '<div style="position:relative;display:inline-block;">'+panelSvg+labelDiv+'</div>';
}

var BG={run:false,t:0,mode:'',pts:[],rays:[]};
function startBg(key,phase){
  BG.run=false;cv.width=window.innerWidth;cv.height=window.innerHeight;
  var col=C[key];var isStep=(phase==='step');
  BG={run:true,t:0,mode:key,phase:phase||'',flame:isStep&&col?col.flame:null,fi:isStep&&col?col.fi:0,shoji:isStep&&col?col.shoji:null,pts:[],rays:[],grabStartMs:phase==='grab'?performance.now():0,grabLastMs:phase==='grab'?performance.now():0,grabPhase:0,grabBeat:0,orbits:null};
  if(phase==='jackpot'){var cnt=36;for(var i=0;i<cnt;i++) BG.rays.push({a:(Math.PI*2/cnt)*i,len:0.5+Math.random()*0.5,sp:0.004+Math.random()*0.005,ph:Math.random()*Math.PI*2});for(var j=0;j<30;j++) spawnF(true);}
  drawBg();
}
function stopBg(){BG.run=false;BG.orbits=null;}
function darkenBg(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.round(r*0.38);g=Math.round(g*0.38);b=Math.round(b*0.38);return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);}
function spawnF(gold){var W=cv.width,H=cv.height;BG.pts.push({x:W*(0.1+Math.random()*0.8),y:H*(0.5+Math.random()*0.5),vx:(Math.random()-0.5)*3,vy:-(2+Math.random()*5),life:1,decay:0.01+Math.random()*0.015,sz:8+Math.random()*28,gold:gold});}
function hRgba(hex,a){return 'rgba('+parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16)+','+a.toFixed(2)+')';}
function drawBg(){
  if(!BG.run) return;
  BG.t+=0.02;var W=cv.width,H=cv.height,cx=W/2,cy=H/2;bx.clearRect(0,0,W,H);var gold=BG.mode==='gold'||BG.mode==='jackpot';
  if(BG.shoji){var cols=5,rows=9,cw=W/cols,rh=H/rows;bx.fillStyle=BG.shoji;bx.fillRect(0,0,W,H);bx.strokeStyle='rgba(0,0,0,0.75)';bx.lineWidth=2.5;for(var ci=1;ci<cols;ci++){bx.beginPath();bx.moveTo(ci*cw,0);bx.lineTo(ci*cw,H);bx.stroke();}for(var ri=1;ri<rows;ri++){bx.beginPath();bx.moveTo(0,ri*rh);bx.lineTo(W,ri*rh);bx.stroke();}var vgT=bx.createLinearGradient(0,0,0,H*0.45);vgT.addColorStop(0,'rgba(0,0,0,0.88)');vgT.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=vgT;bx.fillRect(0,0,W,H*0.45);var vgB=bx.createLinearGradient(0,H,0,H*0.55);vgB.addColorStop(0,'rgba(0,0,0,0.88)');vgB.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=vgB;bx.fillRect(0,H*0.55,W,H*0.45);var hgL=bx.createLinearGradient(0,0,W*0.38,0);hgL.addColorStop(0,'rgba(0,0,0,0.88)');hgL.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=hgL;bx.fillRect(0,0,W*0.38,H);var hgR=bx.createLinearGradient(W,0,W*0.62,0);hgR.addColorStop(0,'rgba(0,0,0,0.88)');hgR.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=hgR;bx.fillRect(W*0.62,0,W*0.38,H);}
  if(BG.flame) drawEdgeFlame(W,H,BG.flame,BG.t,BG.fi);
  if(BG.phase==='grab'){var nowMs=performance.now();var tSec=(nowMs-BG.grabStartMs)/1000;var p=Math.min(tSec/11,1);var bpm=55+Math.pow(p,2.2)*165;var period=60/bpm;var dt=(nowMs-(BG.grabLastMs||nowMs))/1000;BG.grabLastMs=nowMs;BG.grabPhase=(BG.grabPhase||0)+dt/period;var ph=BG.grabPhase%1;var beat=ph<0.12?ph/0.12:Math.max(0,1-(ph-0.12)/0.88);beat=Math.pow(beat,2);BG.grabBeat=beat;if(beat>0.01){var pulseR=Math.max(W,H)*0.95;var rp=bx.createRadialGradient(cx,cy,0,cx,cy,pulseR);rp.addColorStop(0,'rgba(210,0,0,'+(beat*0.75).toFixed(3)+')');rp.addColorStop(0.4,'rgba(150,0,0,'+(beat*0.45).toFixed(3)+')');rp.addColorStop(0.8,'rgba(80,0,0,'+(beat*0.20).toFixed(3)+')');rp.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=rp;bx.fillRect(0,0,W,H);}} else {BG.grabBeat=0;BG.grabPhase=0;BG.grabStartMs=0;BG.grabLastMs=0;}
  if(BG.rays.length>0){BG.rays.forEach(function(r){r.ph+=r.sp;var al=0.18+Math.sin(r.ph)*0.1,ml=Math.max(W,H)*r.len;var ex=cx+Math.cos(r.a)*ml,ey=cy+Math.sin(r.a)*ml;var g=bx.createLinearGradient(cx,cy,ex,ey);g.addColorStop(0,gold?'rgba(255,200,0,'+al+')':'rgba(255,60,0,'+al+')');g.addColorStop(1,'rgba(0,0,0,0)');bx.beginPath();bx.moveTo(cx,cy);bx.lineTo(cx+Math.cos(r.a-0.04)*ml,cy+Math.sin(r.a-0.04)*ml);bx.lineTo(ex,ey);bx.lineTo(cx+Math.cos(r.a+0.04)*ml,cy+Math.sin(r.a+0.04)*ml);bx.closePath();bx.fillStyle=g;bx.fill();});var rg=bx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.45);rg.addColorStop(0,gold?'rgba(255,220,80,'+(0.35+Math.sin(BG.t*2)*0.1)+')':'rgba(255,80,0,'+(0.3+Math.sin(BG.t*2)*0.1)+')');rg.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=rg;bx.fillRect(0,0,W,H);if(Math.floor(BG.t*50)%2===0) spawnF(gold);}
  if(BG.orbits&&BG.orbits.length>0){var ocx=W/2,ocy=H/2;BG.orbits.forEach(function(o){o.phase+=o.speed;o.wPhase+=0.02;var r=o.radius*(1+Math.sin(o.wPhase)*o.wobble);var px=ocx+Math.cos(o.phase)*r;var py=ocy+Math.sin(o.phase)*r;bx.fillStyle=o.col;bx.globalAlpha=0.85;bx.beginPath();bx.arc(px,py,o.sz,0,Math.PI*2);bx.fill();bx.globalAlpha=1;});}
  BG.pts=BG.pts.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=(p.vy>0?0.15:0.08);p.vx*=0.98;p.life-=p.decay;p.sz*=(p.szDecay||0.99);if(p.life<=0||p.sz<1) return false;bx.globalAlpha=p.life;if(p.col){bx.fillStyle=p.col;if(p.shape==='rect'){bx.save();bx.translate(p.x,p.y);bx.rotate(p.vx*0.3);bx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);bx.restore();}else{bx.beginPath();bx.arc(p.x,p.y,p.sz/2,0,Math.PI*2);bx.fill();}}else{var g2=bx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);g2.addColorStop(0,p.gold?'rgba(255,230,80,'+p.life+')':'rgba(255,130,0,'+p.life+')');g2.addColorStop(1,'rgba(0,0,0,0)');bx.fillStyle=g2;bx.beginPath();bx.arc(p.x,p.y,p.sz,0,Math.PI*2);bx.fill();}bx.globalAlpha=1;return true;});

function resolveResult(g){if(g.tier>=6){showJackpot(g);return;}if(g.tier<=3){showResult(g);var overlay=document.createElement('div');overlay.style.cssText='position:fixed;inset:0;z-index:95;background:#fff;pointer-events:none;opacity:1;';document.body.appendChild(overlay);requestAnimationFrame(function(){requestAnimationFrame(function(){overlay.style.transition='opacity 0.5s ease';overlay.style.opacity='0';setTimeout(function(){overlay.remove();},500);});});}else{var W2=window.innerWidth,H2=window.innerHeight;var colors=g.tier>=5?['#ff2200','#ff6600','#ffcc00','#ff0000','#ffffff','#ff4400']:['#cc00ff','#ff00cc','#aa00ff','#ffffff','#ff44ff','#8800ff'];var redOverlay=document.createElement('div');redOverlay.style.cssText='position:fixed;inset:0;z-index:95;background:#cc0000;pointer-events:none;opacity:1;';document.body.appendChild(redOverlay);flash(1.0);shake(3);setTimeout(function(){showResult(g);requestAnimationFrame(function(){requestAnimationFrame(function(){redOverlay.style.transition='opacity 0.35s ease';redOverlay.style.opacity='0';setTimeout(function(){redOverlay.remove();},350);});});BG.orbits=[];var count=g.tier>=5?120:80;for(var oi=0;oi<count;oi++){var radius=Math.min(W2,H2)*(0.18+Math.random()*0.32);var speed=(Math.random()>0.5?1:-1)*(0.008+Math.random()*0.016);var phase=Math.random()*Math.PI*2;var col=colors[Math.floor(Math.random()*colors.length)];var sz=2+Math.random()*6;var wobble=Math.random()*0.3;BG.orbits.push({radius:radius,speed:speed,phase:phase,col:col,sz:sz,wobble:wobble,wPhase:Math.random()*Math.PI*2});}},250);}}
function showGoldResult(g){_currentBonusGroup=g;stopBg();var W=window.innerWidth,H=window.innerHeight;var sz=Math.min(W*0.72,360);var rwColors=['#ff0000','#ff7700','#ffee00','#00cc00','#0055ff','#aa00ff','#ff0099'];BG.run=false;cv.width=W;cv.height=H;BG={run:true,t:0,mode:'gold',phase:'result',flame:RAINBOW_FLAME,fi:1.0,shoji:null,pts:[],rays:[],grabStartMs:0,grabLastMs:0,grabPhase:0,grabBeat:0,orbits:[]};[0.15,0.28,0.42].forEach(function(rFactor,li){var count=li===2?160:li===1?120:80;for(var oi=0;oi<count;oi++){var radius=Math.min(W,H)*(rFactor+Math.random()*0.08);var speed=(Math.random()>0.5?1:-1)*(0.012+li*0.006+Math.random()*0.012);var col=rwColors[Math.floor(Math.random()*rwColors.length)];var sz2=2+Math.random()*(li===2?8:5);BG.orbits.push({radius:radius,speed:speed,phase:Math.random()*Math.PI*2,col:col,sz:sz2,wobble:0.1+Math.random()*0.2,wPhase:Math.random()*Math.PI*2});}});drawBg();stage.style.background=BGCOL.gold;ct.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:5vh;position:relative;z-index:2;"><div id="result-item" style="transform:scale(7);transition:transform 0.7s cubic-bezier(0.1,0.9,0.25,1);">'+makeHex(g.label,sz,g.tier)+'</div><div class="bonus-result-copy"><div class="bonus-result-kind" id="bonusRewardKind">結果確定</div><div class="bonus-result-text" id="bonusRewardText">読込中...</div><div class="bonus-result-sub" id="bonusRewardSub">報酬を準備中</div></div><div id="result-btn" style="opacity:0;transition:opacity 0.3s ease 0.6s;"><button type="button" class="rst" onclick="finishBonus(_currentBonusGroup)">閉じる</button></div></div>';requestRewardForGroup(g);var rfCount=0;var rfInt=setInterval(function(){flash(0.7);stage.style.background=rwColors[rfCount%rwColors.length];shake(rfCount%3===0?3:1);rfCount++;if(rfCount>=8)clearInterval(rfInt);},80);requestAnimationFrame(function(){requestAnimationFrame(function(){var item=document.getElementById('result-item');var btn=document.getElementById('result-btn');if(item)item.style.transform='scale(1)';if(btn)btn.style.opacity='1';setTimeout(function(){startHexVibrate(6);},750);});});}
function showJackpot(g){stopBg();var bo=document.getElementById('bo');bo.style.transition='opacity 1.2s ease';bo.style.opacity='1';bo.style.pointerEvents='all';later(function(){startBg('jackpot','jackpot');stage.style.background=BGCOL.gold;var W=window.innerWidth,H=window.innerHeight;var fs=Math.min(W*0.38,H*0.36);var sq=W*0.55;var cx2=W/2,cy2=H/2;var positions=[{x:cx2-sq/2,y:cy2-sq/2,anchor:'middle',base:'auto'},{x:cx2+sq/2,y:cy2-sq/2,anchor:'middle',base:'auto'},{x:cx2-sq/2,y:cy2+sq/2,anchor:'middle',base:'hanging'},{x:cx2+sq/2,y:cy2+sq/2,anchor:'middle',base:'hanging'}];var chars=['完','全','勝','利'],rows='';chars.forEach(function(ch,i){var p=positions[i];var fa='x="'+p.x+'" y="'+p.y+'" text-anchor="'+p.anchor+'" dominant-baseline="'+p.base+'" font-family="Noto Serif JP,serif" font-weight="700" font-size="'+fs+'"';rows+='<text id="jc'+i+'" '+fa+' opacity="0" fill="none" stroke="#ffffff" stroke-width="'+Math.round(fs*0.16)+'" stroke-linejoin="round" paint-order="stroke">'+ch+'</text><text '+fa+' opacity="0" id="jcb'+i+'" fill="none" stroke="#000000" stroke-width="'+Math.round(fs*0.10)+'" stroke-linejoin="round" paint-order="stroke">'+ch+'</text><text class="jcf" id="jcf'+i+'" '+fa+' opacity="0" fill="#FFD700">'+ch+'</text>';});ct.innerHTML='<svg id="jsvg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;">'+rows+'</svg>';chars.forEach(function(_,i){later(function(){['jc','jcb','jcf'].forEach(function(pfx){var el=document.getElementById(pfx+i);if(el)el.setAttribute('opacity','1');});},i*300);});bo.style.transition='opacity 0.15s';bo.style.opacity='0';bo.style.pointerEvents='none';var FL=['#ff0000','#0044ff','#aa00ff','#FFD700','#ff6600','#000099','#00cc44'],tk=0;var fi=setInterval(function(){var c=FL[tk%FL.length];document.querySelectorAll('.jcf').forEach(function(el){el.setAttribute('fill',c);});stage.style.background=c;tk++;if(tk>=35){clearInterval(fi);stage.style.background=BGCOL.gold;var js=document.getElementById('jsvg');if(js){js.style.transition='opacity 0.2s';js.style.opacity='0';}showGoldResult(g);}},120);},3800);}

// ===== DOPAON parent bridge: 見た目は触らず、本体との通信だけ追加 =====

function dopaonBonusTierFromGroup(g){
  if(!g)return 'white';
  if(g.resultBg==='blue')return 'blue';
  if(g.resultBg==='green')return 'green';
  if(g.resultBg==='purple')return 'purple';
  if(g.resultBg==='red')return 'red';
  if(g.resultBg==='gold')return 'gold';
  return 'white';
}
var _bonusPrepared=false;
var _currentBonusGroup=null;
function setBonusRewardText(payload){
  payload=payload||{};
  var k=document.getElementById('bonusRewardKind');
  var t=document.getElementById('bonusRewardText');
  var sub=document.getElementById('bonusRewardSub');
  if(k)k.textContent=payload.kind||'結果確定';
  if(t){t.textContent=payload.text||'「報酬」';if(payload.color)t.style.color=payload.color;}
  if(sub)sub.textContent=payload.sub||'タップして戻る';
}
function requestRewardForGroup(g){
  _bonusPrepared=false;
  setBonusRewardText({kind:'結果確定',text:'読込中...',sub:'報酬を準備中'});
  try{window.parent.postMessage({type:'DOPAON_BONUS_PREPARE_REWARD',tier:dopaonBonusTierFromGroup(g)},'*');}
  catch(e){}
}
function finishBonus(g){
  g=g||_currentBonusGroup;
  try{stopBg();stopStepShake();clearAll();if(_hexVibInt){clearInterval(_hexVibInt);_hexVibInt=null;}}catch(e){}
  var msg={type:'DOPAON_BONUS_CLOSE',tier:dopaonBonusTierFromGroup(g)};
  try{window.parent.postMessage(msg,'*');}catch(e){}
  try{window.top.postMessage(msg,'*');}catch(e){}
  var btn=document.querySelector('.rst');
  if(btn){btn.textContent='閉じています...';btn.disabled=true;}
}

window.addEventListener('message',function(e){
  var d=e.data||{};
  if(d.type==='DOPAON_BONUS_START'){
    _currentBonusGroup=null;
    try{clearAll();stopBg();stopStepShake();window._onOse=null;document.getElementById('go').style.display='none';document.getElementById('bo').style.opacity='0';document.getElementById('bo').style.pointerEvents='none';}catch(err){}
    var forced=(d.forceTier&&GROUPS[d.forceTier])?d.forceTier:null;
    playAuto(forced||randomResult());
  }
  if(d.type==='DOPAON_BONUS_REWARD_READY'){
    _bonusPrepared=true;
    setBonusRewardText(d.payload||{});
  }
});
showIdle();
</script>
